name: CI

on:
  push:
    branches: [main, "v*"]
  pull_request:
    branches: [main]

jobs:
  test-user-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn test

  test-blog-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/blog-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn test

  build-images:
    runs-on: ubuntu-latest
    needs: [test-user-service, test-blog-service]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: services/user-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/user-service:latest
      - name: Build and push blog-service
        uses: docker/build-push-action@v5
        with:
          context: services/blog-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/blog-service:latest
