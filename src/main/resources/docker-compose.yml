version: '3.8'
services:
  app:
    container_name: blog-app
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: myblogapp:latest
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/blog_app
      SPRING_DATASOURCE_USERNAME: tamerm
      SPRING_DATASOURCE_PASSWORD: tamerm
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
  db:
    image: mysql:9.2.0
    container_name: blog-app-mysql
    environment:
      MYSQL_ROOT_PASSWORD: demo
      MYSQL_DATABASE: blog_app
      MYSQL_USER: tamerm
      MYSQL_PASSWORD: tamerm
    ports:
      - "3307:3306"
  sonarqube:
    image: sonarqube:10.4-community
    container_name: blog-app-sonarqube
    depends_on:
      - sonar-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
  sonar-db:
    image: postgres:15-alpine
    container_name: blog-app-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonar_db_data: